<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#492094" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bus Pass" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>eTMS Bus Pass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="topbar" id="topbar">
    <button class="iconbtn" id="topLeftBtn" aria-label="menu"></button>
    <h1 class="topbar-title" id="topbarTitle">Digital Bus Pass</h1>
    <button class="iconbtn iconbtn-bell" id="topBellBtn" aria-label="notifications" hidden></button>
  </header>

  <main id="view" class="view"></main>

  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-header">
      <div class="drawer-name" id="drawerName">BAISHAKHI BORAL</div>
    </div>
    <nav class="drawer-nav" id="drawerNav"></nav>
  </aside>
  <div class="scrim" id="scrim"></div>

  <div class="dialog-overlay" id="dialogOverlay" aria-hidden="true">
    <div class="dialog" id="dialog">
      <div class="dialog-header" id="dialogHeader">Alert</div>
      <div class="dialog-body" id="dialogBody"></div>
      <div class="dialog-actions">
        <button class="dialog-btn dialog-btn-cancel" id="dialogCancel">Cancel</button>
        <button class="dialog-btn dialog-btn-confirm" id="dialogConfirm">Confirm</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="icons.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
